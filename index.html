<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Omphi — SourceAware</title>
<meta name="description" content="Omphi, the intelligence surface of SourceAware.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%2314B8A6' stroke-width='3'/%3E%3C/svg%3E">
<style>
  :root{
    --paper:#FAFAF7;
    --ink:#1A2422;
    --teal:#14B8A6;
    --teal-deep:#0E8276;
    --muted:#7E8A86;
    --hairline:#E4E6E1;
    --warn:#B4543E;
    --serif:Georgia,'Iowan Old Style','Times New Roman',serif;
    --sans:system-ui,-apple-system,'Segoe UI',sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper);color:var(--ink);
    font-family:var(--sans);font-size:16px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:41rem;margin:0 auto;padding:0 1.25rem}

  /* ——— The empty state: wordmark, one line, one field ——— */
  #hero{min-height:82vh;display:flex;flex-direction:column;justify-content:center}
  .eyebrow{
    font-family:var(--sans);font-size:.68rem;letter-spacing:.34em;
    color:var(--muted);text-transform:uppercase;margin-bottom:1.1rem;
  }
  .wordmark{
    font-family:var(--serif);font-size:2.3rem;letter-spacing:.30em;
    text-transform:uppercase;font-weight:400;color:var(--ink);
  }
  .wordmark .o{color:var(--teal-deep)}
  .declaration{
    margin-top:.9rem;color:var(--muted);font-size:.95rem;max-width:34rem;
  }
  body.live #hero{display:none}

  /* ——— Small header once the conversation is live ——— */
  #topbar{display:none;padding:1.1rem 0 .4rem}
  #topbar .wordmark{font-size:.95rem;letter-spacing:.30em}
  body.live #topbar{display:block}

  /* ——— Transcript ——— */
  #transcript{display:none;padding:1.2rem 0 11rem}
  body.live #transcript{display:block}
  .turn{margin:0 0 2.1rem}
  .turn-you{
    border-left:2px solid var(--teal);padding-left:.95rem;
    white-space:pre-wrap;color:var(--ink);
  }
  .turn-omphi{
    font-family:var(--serif);font-size:1.07rem;line-height:1.75;
    white-space:pre-wrap;
  }
  .ledger{
    font-family:var(--mono);font-size:.7rem;letter-spacing:.03em;
    color:var(--muted);margin-top:.6rem;
  }
  .errline{color:var(--warn);font-size:.85rem;margin-top:.6rem}
  .caret{
    display:inline-block;width:.55em;height:1.05em;vertical-align:-0.15em;
    background:var(--teal);margin-left:2px;
    animation:blink 1.05s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion:reduce){.caret{animation:none}}

  /* ——— The composer: one field over one hairline. The seam. ——— */
  #composer{padding:1.6rem 0 0}
  body.live #composer{
    position:fixed;left:0;right:0;bottom:0;
    background:linear-gradient(to top,var(--paper) 78%,rgba(250,250,247,0));
    padding:1.6rem 0 calc(1.1rem + env(safe-area-inset-bottom));
  }
  .fieldrow{display:flex;align-items:flex-end;gap:.8rem;border-bottom:1px solid var(--hairline);
    transition:border-color .25s}
  .fieldrow:focus-within{border-color:var(--teal)}
  textarea{
    flex:1;border:0;outline:0;background:transparent;resize:none;
    font-family:var(--sans);font-size:1rem;line-height:1.55;color:var(--ink);
    padding:.45rem 0 .6rem;max-height:10.5rem;
  }
  textarea::placeholder{color:var(--muted)}
  .act{
    border:0;background:transparent;color:var(--teal-deep);cursor:pointer;
    font-family:var(--sans);font-size:.72rem;letter-spacing:.22em;
    text-transform:uppercase;padding:.55rem 0 .7rem;
  }
  .act:hover{color:var(--teal)}
  .act:focus-visible,textarea:focus-visible,input:focus-visible{
    outline:2px solid var(--teal);outline-offset:3px;border-radius:2px;
  }
  .hint{font-size:.72rem;color:var(--muted);margin-top:.55rem}

  /* ——— The gate ——— */
  #gate{min-height:82vh;display:flex;flex-direction:column;justify-content:center}
  #gate .declaration{margin-bottom:1.4rem}
  #gate input{
    width:100%;border:0;outline:0;background:transparent;
    border-bottom:1px solid var(--hairline);
    font-family:var(--mono);font-size:1rem;letter-spacing:.14em;
    color:var(--ink);padding:.45rem 0 .6rem;transition:border-color .25s;
  }
  #gate input:focus{border-color:var(--teal)}
  #gate .act{margin-top:1.1rem;align-self:flex-start}
  #gateErr{display:none}
</style>
</head>
<body>

<div class="wrap" id="gate" hidden>
  <div class="eyebrow">SourceAware</div>
  <div class="wordmark"><span class="o">O</span>mphi</div>
  <p class="declaration">Enter the access code.</p>
  <input id="codeInput" type="password" autocomplete="off" spellcheck="false" aria-label="Access code">
  <p class="errline" id="gateErr"></p>
  <button class="act" id="gateBtn" type="button">Open</button>
</div>

<div id="app" hidden>
  <div class="wrap" id="topbar">
    <div class="wordmark"><span class="o">O</span>mphi</div>
  </div>

  <div class="wrap" id="hero">
    <div class="eyebrow">SourceAware</div>
    <div class="wordmark"><span class="o">O</span>mphi</div>
    <p class="declaration">The raw substrate is live. The instrument is being built.</p>
  </div>

  <div class="wrap" id="transcript" aria-live="polite"></div>

  <div id="composer">
    <div class="wrap">
      <div class="fieldrow">
        <textarea id="field" rows="1" placeholder="Ask." aria-label="Ask Omphi"></textarea>
        <button class="act" id="askBtn" type="button">Ask</button>
      </div>
      <p class="hint">Enter sends · Shift+Enter for a new line · Esc stops</p>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  var $ = function(s){ return document.querySelector(s); };
  var state = { messages: [], streaming: false, controller: null };
  var code = '';
  try { code = localStorage.getItem('omphi_code') || ''; } catch(e){}

  var gate = $('#gate'), app = $('#app'), gateErr = $('#gateErr');
  var field = $('#field'), askBtn = $('#askBtn'), transcript = $('#transcript');

  function showGate(msg){
    app.hidden = true; gate.hidden = false;
    if (msg){ gateErr.textContent = msg; gateErr.style.display = 'block'; }
    $('#codeInput').focus();
  }
  function showApp(){
    gate.hidden = true; app.hidden = false;
    field.focus();
  }

  $('#gateBtn').addEventListener('click', enterCode);
  $('#codeInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') enterCode();
  });
  function enterCode(){
    var v = $('#codeInput').value.trim();
    if (!v) return;
    code = v;
    try { localStorage.setItem('omphi_code', code); } catch(e){}
    showApp();
  }

  field.addEventListener('input', function(){
    field.style.height = 'auto';
    field.style.height = Math.min(field.scrollHeight, 168) + 'px';
  });
  field.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); submit(); }
    if (e.key === 'Escape' && state.streaming) stop();
  });
  askBtn.addEventListener('click', function(){
    if (state.streaming) stop(); else submit();
  });

  function submit(){
    if (state.streaming) return;
    var text = field.value.trim();
    if (!text) return;
    field.value = ''; field.style.height = 'auto';
    document.body.classList.add('live');
    send(text);
  }
  function stop(){
    if (state.controller) state.controller.abort();
  }
  function setStreaming(on){
    state.streaming = on;
    askBtn.textContent = on ? 'Stop' : 'Ask';
  }
  function el(tag, cls, parent){
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (parent) parent.appendChild(n);
    return n;
  }
  function fmt(n){ return (n || 0).toLocaleString('en-GB'); }
  function scrollEnd(){ window.scrollTo(0, document.body.scrollHeight); }

  function send(text){
    state.messages.push({ role:'user', content:text });
    var you = el('div','turn turn-you',transcript); you.textContent = text;

    var turn = el('div','turn',transcript);
    var body = el('div','turn-omphi',turn);
    var caret = el('span','caret',body);
    var ledger = el('div','ledger',turn);
    scrollEnd();

    var answer = '';
    var usage = { input:0, cacheRead:0, cacheWrite:0, output:0 };
    state.controller = new AbortController();
    setStreaming(true);

    fetch('/api/omphi', {
      method:'POST',
      headers:{ 'content-type':'application/json', 'x-access-code':code },
      body: JSON.stringify({ messages: state.messages }),
      signal: state.controller.signal
    }).then(function(res){
      if (!res.ok){
        return res.json().catch(function(){ return {}; }).then(function(e){
          if (res.status === 401){
            try { localStorage.removeItem('omphi_code'); } catch(_){}
            code = '';
            showGate('That code was not accepted. Enter it again.');
          }
          throw new Error((e && e.error && e.error.message) || ('HTTP ' + res.status));
        });
      }
      var reader = res.body.getReader();
      var dec = new TextDecoder();
      var buf = '';
      function pump(){
        return reader.read().then(function(r){
          if (r.done) return;
          buf += dec.decode(r.value, { stream:true });
          var i;
          while ((i = buf.indexOf('\n\n')) !== -1){
            var chunk = buf.slice(0, i); buf = buf.slice(i + 2);
            chunk.split('\n').forEach(function(line){
              if (line.indexOf('data:') !== 0) return;
              var payload = line.slice(5).trim();
              if (!payload) return;
              var ev; try { ev = JSON.parse(payload); } catch(_) { return; }
              if (ev.type === 'content_block_delta' && ev.delta && ev.delta.type === 'text_delta'){
                answer += ev.delta.text;
                body.textContent = answer;
                body.appendChild(caret);
              } else if (ev.type === 'message_start'){
                var u = (ev.message && ev.message.usage) || {};
                usage.input = u.input_tokens || 0;
                usage.cacheRead = u.cache_read_input_tokens || 0;
                usage.cacheWrite = u.cache_creation_input_tokens || 0;
              } else if (ev.type === 'message_delta'){
                if (ev.usage && ev.usage.output_tokens) usage.output = ev.usage.output_tokens;
              } else if (ev.type === 'error'){
                throw new Error((ev.error && ev.error.message) || 'Stream error.');
              }
            });
          }
          scrollEnd();
          return pump();
        });
      }
      return pump();
    }).then(function(){
      ledger.textContent = 'in ' + fmt(usage.input + usage.cacheRead + usage.cacheWrite)
        + ' · cached ' + fmt(usage.cacheRead)
        + ' · out ' + fmt(usage.output);
    }).catch(function(err){
      if (err && err.name === 'AbortError'){
        ledger.textContent = 'stopped';
      } else {
        var e = el('div','errline',turn);
        e.textContent = (err && err.message) || 'Something failed.';
        ledger.textContent = '';
      }
    }).then(function(){
      caret.remove();
      setStreaming(false);
      state.controller = null;
      if (answer){
        state.messages.push({ role:'assistant', content:answer });
      } else {
        state.messages.pop(); // failed turn: retract so a retry re-sends cleanly
      }
    });
  }

  if (code) showApp(); else showGate();
})();
</script>
</body>
</html>
